services:
  db:
    build:
      context: ./db
    container_name: parking_db
    env_file:
      - ./db/.env
    ports:
      - "5432:5432"
    volumes:
      - ./db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: parking_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
      - backend_node_modules:/var/www/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: parking_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_vendor:
  backend_node_modules:
  frontend_node_modules:
