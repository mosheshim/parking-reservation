services:
  db:
    build:
      context: ./db
    container_name: parking_db
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: parking_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: parking
      DB_USERNAME: parking
      DB_PASSWORD: parking
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
      - backend_node_modules:/var/www/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: parking_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_vendor:
  backend_node_modules:
  frontend_node_modules:
